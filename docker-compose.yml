
x-defaults: &defaults
  restart: unless-stopped
  env_file:
    - .env
  networks:
    - internal
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "5"
  security_opt:
    - no-new-privileges:true

services:
  nginx:
    <<: *defaults
    image: nginx:1.29-alpine
    ports:
      - "8030:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp

  watchtower:
    image: containrrr/watchtower:latest
    restart: unless-stopped
    command:
      - --label-enable
      - --cleanup
      - --rolling-restart
      - --interval
      - "300"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_INCLUDE_STOPPED: "false"
      WATCHTOWER_REVIVE_STOPPED: "false"
    networks:
      - internal

  api:
    <<: *defaults
    image: ghcr.io/imjustnon/mentor-mentee-api:backend-feat-docker-setup
    expose:
      - "3000"
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    <<: *defaults
    image: ghcr.io/imjustnon/mentor-mentee-web:backend-feat-docker-setup
    expose:
      - "3000"
    depends_on:
      api:
        condition: service_healthy
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  internal:
    driver: bridge
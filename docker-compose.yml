version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "8030:80"
    volumes:
      - "./nginx.conf:/etc/nginx/nginx.conf:ro"
    networks:
      - internal
    depends_on:
      - api

  api:
    image: test-api-image
    deploy:
      replicas: 2
    env_file:
      - .env
    networks:
      - internal

networks:
  internal:
    driver: bridge